# Railway Configuration for RewardHub

[build]
# Use the Dockerfile for building the image
dockerfile = "Dockerfile"

[deploy]
# Don't override startCommand - let Docker ENTRYPOINT handle it
# The entrypoint.sh script will properly expand environment variables

# Set environment variables
[env]
JAVA_TOOL_OPTIONS = "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
